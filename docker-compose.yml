version: "3.8"

services:
  rag-api:
    build: .
    container_name: localrag-api
    ports:
      - "8000:8000"
    environment:
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ZHIPU_MODEL=glm-4
      - ZHIPU_EMBEDDING_MODEL=embedding-2
      - CHROMA_PERSIST_DIR=/data/chroma
      - CHROMA_COLLECTION=documents
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - TOP_K=5
      - MAX_HISTORY=10
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
